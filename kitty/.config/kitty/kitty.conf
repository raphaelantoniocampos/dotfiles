# BEGIN_KITTY_THEME
#
include ${KITTY_THEME}.conf
envinclude KITTY_THEME* ${KITTY_THEME}.conf

# Dynamically include themes based on KITTY_THEME_ENV value
# END_KITTY_THEME

font_size 12

background_opacity 0.95

# BEGIN_KITTY_FONTS
font_family      0xProto Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_features 0xProtoNF-Regular ss01
# END_KITTY_FONTS
#
enable_audio_bell no
