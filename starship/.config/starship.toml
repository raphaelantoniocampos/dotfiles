format = "$all"
right_format = """$git_branch $git_status $git_state $cmd_duration"""

[directory]
truncation_length = 2

[hostname]
format = "[$ssh_symbol $hostname]($style) "

[git_branch]
symbol = "ΌςΕ"
format =  "[$symbol $branch (:$remote_branch)]($style)"

[git_status]
style = "bold blue"
format = "[$modified$deleted$untracked$ahead_behind]($style) "
modified = "ΎΣβ "
deleted = "ΎΣα "
untracked = "ΎΡι "
ahead = "ΎΑδ "
behind = "ΎΑγ "
up_to_date = "ΎΒζ "

[cmd_duration]
min_time = 20_000

